services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: coaching_app
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./app:/var/www/html
    depends_on:
      - db
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html/public
      APACHE_LOG_DIR: /var/log/apache2

  db:
    image: mysql:8
    container_name: coaching_db
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-coaching_db}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root}"
      MYSQL_USER: "${DB_USERNAME:-coaching_user}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-coaching_secret}"
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: coaching_phpmyadmin
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: "${DB_USERNAME:-coaching_user}"
      PMA_PASSWORD: "${DB_PASSWORD:-coaching_secret}"
      UPLOAD_LIMIT: 256M
    ports:
      - "${PMA_PORT:-8080}:80"

volumes:
  db_data: